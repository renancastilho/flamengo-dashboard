services:
  db:
    image: postgres:16-alpine
    container_name: fla_postgres
    environment:
      POSTGRES_DB: flamengo_db
      POSTGRES_USER: fla_user
      POSTGRES_PASSWORD: mengao1895
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fla_user -d flamengo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fla_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: fla_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://fla_user:mengao1895@db:5432/flamengo_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: flamengo-o-maior-do-brasil-secret-key-2025
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: fla_frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  nginx:
    image: nginx:alpine
    container_name: fla_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
